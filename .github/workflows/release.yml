name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Import macOS code signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          # Skip if no cert is configured — the job will fall back to ad-hoc
          # signing and the released DMG will require Gatekeeper trust on
          # download.
          if [ -z "$MACOS_CERT_P12_BASE64" ]; then
            echo "MACOS_CERT_P12_BASE64 is empty; skipping cert import (ad-hoc signing)."
            exit 0
          fi
          # Create a temporary keychain that lives only for this job and import
          # the .p12. The keychain password is randomly generated. `codesign`
          # looks up identities across all unlocked keychains in the search
          # list, so adding ours is enough.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          P12_PATH="$RUNNER_TEMP/cert.p12"
          echo -n "$MACOS_CERT_P12_BASE64" | base64 --decode -o "$P12_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$P12_PATH" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$P12_PATH"

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build & embed QuickLook extension
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY || '-' }}
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/md-viewer.app"
          case "${{ matrix.target }}" in
            aarch64-*) ARCH=arm64  ;;
            x86_64-*)  ARCH=x86_64 ;;
          esac
          ARCH="$ARCH" ./scripts/install-quicklook.sh "$APP"

      - name: Repackage DMG with embedded extension
        run: |
          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/md-viewer.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          VERSION=$(node -p "require('./package.json').version")
          case "${{ matrix.target }}" in
            aarch64-*) SUFFIX=aarch64 ;;
            x86_64-*)  SUFFIX=x64     ;;
          esac
          rm -f "$DMG_DIR"/*.dmg
          mkdir -p "$DMG_DIR"
          hdiutil create -volname md-viewer -srcfolder "$APP" -ov -format UDZO \
            "$DMG_DIR/md-viewer_${VERSION}_${SUFFIX}.dmg"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload deb to Release
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload MSI to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
